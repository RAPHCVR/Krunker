apiVersion: apps/v1
kind: Deployment
metadata:
  name: krunker-client
  namespace: krunker
  labels:
    app.kubernetes.io/name: krunker-client
    app.kubernetes.io/component: client
    app.kubernetes.io/part-of: krunker-arena
  annotations:
    keel.sh/match-tag: "true"
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 1m'
spec:
  replicas: 2
  minReadySeconds: 5
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: krunker-client
      app.kubernetes.io/part-of: krunker-arena
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: krunker-client
        app.kubernetes.io/component: client
        app.kubernetes.io/part-of: krunker-arena
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: client
          image: ghcr.io/raphcvr/krunker-client:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 2
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 24
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: krunker-client
  namespace: krunker
  labels:
    app.kubernetes.io/name: krunker-client
    app.kubernetes.io/part-of: krunker-arena
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: krunker-client
    app.kubernetes.io/part-of: krunker-arena
  ports:
    - name: http
      port: 80
      targetPort: http
