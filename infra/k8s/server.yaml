apiVersion: apps/v1
kind: Deployment
metadata:
  name: krunker-server
  namespace: krunker
  labels:
    app.kubernetes.io/name: krunker-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: krunker-arena
  annotations:
    keel.sh/match-tag: "true"
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: '@every 1m'
spec:
  replicas: 1
  minReadySeconds: 5
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: krunker-server
      app.kubernetes.io/part-of: krunker-arena
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: krunker-server
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: krunker-arena
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: ghcr.io/raphcvr/krunker-server:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: krunker-config
            - secretRef:
                name: krunker-app-secret
          ports:
            - name: http
              containerPort: 2567
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 24
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: krunker-server
  namespace: krunker
  labels:
    app.kubernetes.io/name: krunker-server
    app.kubernetes.io/part-of: krunker-arena
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: krunker-server
    app.kubernetes.io/part-of: krunker-arena
  ports:
    - name: http
      port: 2567
      targetPort: http
