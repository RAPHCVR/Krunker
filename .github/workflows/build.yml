name: Build and publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: krunker-${{ github.ref }}
  cancel-in-progress: true

env:
  CLIENT_IMAGE: ghcr.io/raphcvr/krunker-client
  SERVER_IMAGE: ghcr.io/raphcvr/krunker-server
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm audit --prod
      - run: pnpm build
      - uses: azure/setup-kubectl@v4
      - run: kubectl kustomize infra/k8s

  images:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: client
            dockerfile: Dockerfile.client
            image: ghcr.io/raphcvr/krunker-client
          - name: server
            dockerfile: Dockerfile.server
            image: ghcr.io/raphcvr/krunker-server
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          sbom: true
          provenance: true
